# Crontab Configuration for Automated Backup System
# Install with: crontab backup-system.crontab
# Or append: cat backup-system.crontab >> ~/.crontab && crontab ~/.crontab

# ==============================================
# AUTOMATED BACKUP SYSTEM - Hourly Schedule
# ==============================================

# Run backup every hour at minute 0
0 * * * * /Users/andrewbot/workspace/backup-system/scripts/backup.sh >> /Users/andrewbot/.backup-system/logs/backup.log 2>&1

# Run git sync every hour at minute 5
5 * * * * cd /Users/andrewbot/.openclaw/workspace && git add -A && git diff --staged --quiet || git commit -m "$(date +'\%Y-\%m-\%d \%H:00') Auto-backup" && git push origin main >> /Users/andrewbot/.backup-system/logs/git-sync.log 2>&1

# Clean up old local backups daily at 2 AM
0 2 * * * /Users/andrewbot/workspace/backup-system/scripts/backup.sh --cleanup >> /Users/andrewbot/.backup-system/logs/cleanup.log 2>&1

# ==============================================
# ENVIRONMENT VARIABLES REQUIRED
# ==============================================
# Add these to your shell profile (.zshrc, .bashrc):
#
# export BACKUP_ENCRYPTION_PASSWORD="your-encryption-password"
# export DRIVE_UPLOAD_PASSWORD="your-drive-password"
# export TELEGRAM_BOT_TOKEN="your-telegram-bot-token"
# export TELEGRAM_CHAT_ID="your-chat-id"
# export DRIVE_FOLDER_ID="your-drive-folder-id"
# export WORKSPACE_DIR="/Users/andrewbot/.openclaw/workspace"
# export BACKUP_DIR="/Users/andrewbot/.backup-system/backups"
#
# Google Drive CLI (gog) must be authenticated:
# gog auth login
#
# Pre-commit hook install:
# cd /Users/andrewbot/.openclaw/workspace
# ln -s ../backup-system/scripts/pre-commit .git/hooks/pre-commit

# ==============================================
# MANUAL COMMANDS
# ==============================================
# List backups:      ls -la ~/.backup-system/backups/
# Run backup now:   /Users/andrewbot/workspace/backup-system/scripts/backup.sh
# Restore backup:   /Users/andrewbot/workspace/backup-system/scripts/restore.sh --list
# View logs:        tail -f /Users/andrewbot/.backup-system/logs/backup.log
